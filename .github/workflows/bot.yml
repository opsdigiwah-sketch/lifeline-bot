name: Lifeline Trading Bot

on:
  schedule:
    # 4:00 UTC = 9:30 AM IST, Mon-Fri
    # Starting at 9:30 instead of 9:00 so total runtime stays under 6hr limit
    # (9:30 IST start → 3:15 IST squareoff = 5h45m, safe under 355min timeout)
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355  # 5h55m hard cap — prevents 6hr kill like 29-Apr-2026
    env:
      TZ: Asia/Kolkata
      PYTHONIOENCODING: utf-8
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: python ZERO_TOUCH_BOT.py
