name: Lifeline Trading Bot

on:
  # schedule trigger REMOVED — caused 2.5hr queue delays on free runners.
  # cron-job.org hits the GitHub API at 9:20 AM IST (3:50 UTC) Mon-Fri,
  # which fires workflow_dispatch instantly with no queue wait.
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355  # 5h55m — 9:20 IST start → 3:15 IST squareoff = 5h55m
    env:
      TZ: Asia/Kolkata
      PYTHONIOENCODING: utf-8
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        run: python ZERO_TOUCH_BOT.py
